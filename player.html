<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Player - Bible Quiz Pro</title>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at bottom left, #1e1b4b, #0f172a);
            min-height: 100vh;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-focus:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.3);
        }
        .log-entry {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <!-- Step 1: Team Selection -->
    <div id="setup-ui" class="glass p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
        <h2 class="text-2xl font-extrabold mb-2 text-purple-400">Join the Quiz</h2>
        <p class="text-slate-400 text-sm mb-8">Enter your team name to begin.</p>
        
        <input type="text" id="team-name" placeholder="TEAM NAME" 
            class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-6 font-bold tracking-widest uppercase input-focus">
        
        <button onclick="joinGame()" class="w-full bg-purple-600 hover:bg-purple-500 p-4 rounded-2xl font-black uppercase tracking-widest transition-all active:scale-95">
            Connect to Live
        </button>
    </div>

    <!-- Step 2: Main Game UI -->
    <div id="game-ui" class="hidden w-full max-w-2xl">
        <div class="glass p-6 rounded-3xl mb-6 flex justify-between items-center">
            <div class="text-left">
                <p class="text-[10px] font-bold text-purple-400 uppercase tracking-widest">Active Team</p>
                <h3 id="display-team" class="font-black text-xl uppercase italic">---</h3>
            </div>
            <div id="live-indicator" class="flex items-center gap-2 px-4 py-2 bg-emerald-500/10 rounded-full border border-emerald-500/20">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-emerald-500 text-[10px] font-bold uppercase">Connected</span>
            </div>
        </div>

        <!-- Waiting State -->
        <div id="waiting-state" class="py-12 text-center">
            <div class="animate-bounce mb-6 text-6xl">⏳</div>
            <h2 class="text-3xl font-extrabold text-slate-300">Waiting for Question...</h2>
            <p class="text-slate-500 mt-2">The admin will flash the next challenge shortly.</p>
        </div>

        <!-- Answer State -->
        <div id="answer-state" class="hidden text-center">
            <div id="pts-badge" class="inline-block bg-amber-400 text-slate-900 px-4 py-1 rounded-full text-xs font-black mb-4">0 POINTS</div>
            <h2 id="current-q" class="text-2xl md:text-3xl font-bold mb-8 leading-tight">...</h2>
            
            <input type="text" id="answer-input" placeholder="TYPE YOUR ANSWER HERE" 
                class="w-full bg-white/10 border-2 border-purple-500/30 p-6 rounded-[2rem] text-2xl font-black text-center uppercase tracking-widest input-focus mb-4">
            
            <button id="submit-btn" onclick="submitAnswer()" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
                Submit Answer
            </button>
        </div>

        <!-- Recent Correct Answers Log -->
        <div class="mt-12">
            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-4 text-center">Recent Winners</h4>
            <div id="winner-log" class="space-y-2">
                <!-- Winners will appear here -->
            </div>
        </div>
    </div>

    <script>
        // SCRIPT_URL from your provided source
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwF9VR8YQ2UehcXHf-tZWaZDI0HdCCLF4r-x1s5fzH-D8qaVJPj6v21rr7HMViu6hNK/exec";
        
        let teamName = "";
        let currentCorrectAns = "";
        let currentPoints = 0;
        let hasSubmitted = false;
        let lastWinnerCount = 0;

        function joinGame() {
            const input = document.getElementById('team-name').value.trim();
            if(!input) return alert("Please enter a team name.");
            teamName = input.toUpperCase();
            
            document.getElementById('display-team').innerText = teamName;
            document.getElementById('setup-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            
            setInterval(syncPlayer, 1500);
        }

        async function syncPlayer() {
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();

                const waiting = document.getElementById('waiting-state');
                const answer = document.getElementById('answer-state');

                // 1. Handle Question State
                if (data.status === "ACTIVE") {
                    waiting.classList.add('hidden');
                    answer.classList.remove('hidden');
                    document.getElementById('current-q').innerText = data.question;
                    document.getElementById('pts-badge').innerText = data.points + " POINTS";
                    currentCorrectAns = data.answer.toUpperCase();
                    currentPoints = data.points;
                } else {
                    waiting.classList.remove('hidden');
                    answer.classList.add('hidden');
                    resetInput();
                }

                // 2. Update Winner Log (New functionality)
                if (data.players) {
                    updateWinnerLog(data.players);
                }
            } catch (e) { console.error("Sync Error:", e); }
        }

        function updateWinnerLog(players) {
            const logContainer = document.getElementById('winner-log');
            // We only show teams that actually have a score
            const scoringTeams = players.filter(p => p.score > 0)
                                        .sort((a, b) => b.lastUpdated - a.lastUpdated); // Assuming your script tracks timing

            // Simple logic: If scoreboard changes, clear and redraw
            logContainer.innerHTML = players
                .filter(p => p.score > 0)
                .slice(0, 3) // Show top 3 or most recent
                .map(p => `
                    <div class="glass log-entry p-3 rounded-xl flex justify-between items-center border-l-4 border-emerald-500">
                        <span class="text-xs font-bold uppercase tracking-widest">${p.name}</span>
                        <span class="text-emerald-400 font-black text-xs">+${p.score} Total</span>
                    </div>
                `).join('');
        }

        async function submitAnswer() {
            if(hasSubmitted) return;
            
            const playerAns = document.getElementById('answer-input').value.trim().toUpperCase();
            if(!playerAns) return;

            if(playerAns === currentCorrectAns) {
                hasSubmitted = true;
                const btn = document.getElementById('submit-btn');
                btn.innerText = "CORRECT!";
                btn.classList.replace('bg-indigo-600', 'bg-emerald-600');

                // Using the action 'submitScore' and key 'user' to match your Score Central logic
                await fetch(SCRIPT_URL, {
                    method: "POST", 
                    mode: "no-cors",
                    body: JSON.stringify({ 
                        action: "submitScore", 
                        user: teamName, 
                        points: currentPoints 
                    })
                });

                setTimeout(() => {
                    btn.innerText = "WAITING FOR NEXT...";
                    btn.disabled = true;
                }, 1500);
            } else {
                alert("WRONG ANSWER! ALL CAPS PLEASE.");
            }
        }

        function resetInput() {
            const btn = document.getElementById('submit-btn');
            document.getElementById('answer-input').value = "";
            btn.innerText = "Submit Answer";
            btn.disabled = false;
            btn.className = "w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-indigo-500/20 transition-all active:scale-95";
            hasSubmitted = false;
        }
    </script>
</body>
</html>
