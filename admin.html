<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Admin - Bible Quiz Pro</title>
    <link rel="icon" type="image/png" href="IBMP.png">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #2e1065, #0f172a);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-purple {
            background: rgba(167, 139, 250, 0.12);
            border-color: rgba(167, 139, 250, 0.25);
        }
        .glass-card:not(.spent):hover {
            background: rgba(167, 139, 250, 0.22);
            border-color: rgba(167, 139, 250, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }
        .glass-card.spent {
            opacity: 0.3;
            filter: grayscale(1);
            cursor: default;
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.05);
        }
        .text-gradient {
            background: linear-gradient(to right, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-slate-200 p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-gradient">Briefcase Control</h1>
                <p class="text-slate-400 text-sm mt-1 uppercase tracking-widest">Master Administrator Console</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="clearHistory()" class="text-[10px] font-bold text-slate-400 hover:text-red-400 uppercase tracking-widest transition">Clear History</button>
                
                <button onclick="toggleFullscreen()" class="px-4 py-2 rounded-full glass text-[10px] font-bold text-slate-300 hover:text-white uppercase tracking-widest transition flex items-center gap-2">
                    <span id="fs-icon">⛶</span> <span id="fs-text">Fullscreen</span>
                </button>

                <div class="px-4 py-2 rounded-full glass text-xs font-semibold flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> SYSTEM LIVE
                </div>
            </div>
        </header>
        
        <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="glass border-purple-500/30 p-8 rounded-3xl max-w-lg w-full shadow-2xl relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-600/20 blur-3xl rounded-full"></div>
            <div class="relative">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <p class="text-xs font-bold text-purple-300 uppercase tracking-tighter">Current Stake</p>
                        <div id="m-pts" class="text-4xl font-black text-white">0</div>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-purple-300 uppercase tracking-tighter">Time Remaining</p>
                        <div id="m-timer" class="text-4xl font-black tabular-nums text-white">0s</div>
                    </div>
                </div>
                <div class="bg-white/10 rounded-2xl p-6 mb-8 border border-white/10">
                    <p class="text-xs text-purple-300 uppercase font-bold mb-2 opacity-80">Active Question</p>
                    <p id="m-que" class="text-xl font-medium leading-relaxed text-white"></p>
                </div>
                <div id="answer-box" class="mb-8 hidden">
                    <div class="bg-emerald-500/20 border border-emerald-500/30 rounded-2xl p-4">
                        <p class="text-[10px] text-emerald-400 uppercase tracking-[0.2em] font-bold mb-1">Verified Answer</p>
                        <p id="m-ans" class="text-2xl font-bold text-emerald-300 uppercase"></p>
                    </div>
                    <button onclick="resetSystem()" class="mt-6 w-full py-4 rounded-xl font-bold transition glass hover:bg-red-500/20 text-red-400 border-red-500/20">RESET & CLOSE SESSION</button>
                </div>
                <div id="control-btns" class="space-y-3">
                    <button id="pushBtn" onclick="pushToLive()" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center gap-2">🚀 PUSH TO MONITOR</button>
                    <button id="revealBtn" onclick="revealAnswer()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 py-4 rounded-xl font-bold transition-all hidden">REVEAL CORRECT ANSWER</button>
                    <button onclick="closeModal()" class="w-full py-3 text-slate-400 hover:text-white transition text-sm font-semibold">Cancel & Return</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVlUbM7GCnfiDHYgCmlIqarzqig7_VW1VDwLHXcsyv-zQL9yfKRqpVJmhBhVavn7_T/exec"; 
        let activeQ = null;
        let countdownInterval = null;
        let timeLeft = 0;
        let playedQuestions = JSON.parse(localStorage.getItem('playedBibleQuiz')) || [];

        const questions = [
            { id: 1, p: 50, q: "Which book of the Bible is the shortest, containing only 13 verses?", ans: "2 John", t: 10 },
            { id: 2, p: 150, q: "Who is the only woman in the Bible whose age at death is specifically recorded?", ans: "Sarah", t: 10 },
            { id: 3, p: 200, q: "Paul was a Roman citizen by birth, but in what city was he born?", ans: "Tarsus", t: 10 },
            { id: 4, p: 500, q: "According to Revelation, what is the name of the star that falls from heaven and turns a third of the waters bitter?", ans: "Wormwood", t:10 },
            { id: 5, p: 100, q: "What did God provide for the Israelites to eat in the morning during their 40 years in the wilderness?", ans: "Manna", t: 10 },
            { id: 6, p: 300, q: "In the Book of Judges, who killed the heavy King Eglon of Moab with a double-edged dagger?", ans: "Ehud", t: 10 },
            { id: 7, p: 100, q: "On what mountain did Moses receive the Ten Commandments?", ans: "Sinai", t: 10 },
            { id: 8, p: 250, q: "What was the name of the person who replaced Judas Iscariot as the twelfth apostle?", ans: "Matthias", t: 10 },
            { id: 9, p: 200, q: "Which prophet was taken up to heaven in a whirlwind with a chariot of fire?", ans: "Elijah", t: 10 },
            { id: 10, p: 50, q: "What was the original name of the Apostle Paul before his conversion on the road to Damascus?", ans: "Saul", t: 10 },
            { id: 11, p: 300, q: "Which book of the Bible (in ascending order) never mentions the word 'God'?", ans: "Esther", t: 10 },
            { id: 12, p: 100, q: "Who was thrown into a den of lions because he refused to stop praying to God?", ans: "Daniel", t: 10 },
            { id: 13, p: 400, q: "In the New Testament, who was the first Christian martyr to be killed after the stoning of Stephen?", ans: "James the brother of John", t: 10 },
            { id: 14, p: 250, q: "In the Parable of the Ten Virgins, how many were described as 'foolish?'", ans: "5", t: 10 },
            { id: 15, p: 75, q: "Who was the oldest man mentioned in the Bible, living to be 969 years old?", ans: "Methuselah", t: 10 },
            { id: 16, p: 150, q: "What was the name of the mountain where Noah’s Ark came to rest?", ans: "Ararat", t: 10 },
            { id: 17, p: 500, q: "Who was the father of the giant Goliath?", ans: "champion from Gath", t: 10 },
            { id: 18, p: 400, q: "What was the name of the slave whose ear was cut off by Peter and then healed by Jesus?", ans: "Malchus", t: 10 },
            { id: 19, p: 75, q: "Which plague was the first to strike Egypt when Pharaoh refused to let the Israelites go? - three words", ans: "Water into blood", t: 10 },
            { id: 20, p: 250, q: "What was the name of the King of Salem and 'Priest of God Most High' who blessed Abraham?", ans: "Melchizedek", t: 10 }
        ];

        // --- Fullscreen Feature ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error: ${err.message}`);
                });
                document.getElementById('fs-text').innerText = "Exit";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fs-text').innerText = "Fullscreen";
                }
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            questions.forEach(item => {
                const isPlayed = playedQuestions.includes(item.id);
                const btn = document.createElement('div');
                btn.id = `box-${item.id}`;
                btn.className = `glass-card card-purple p-12 rounded-[2rem] cursor-pointer flex flex-col items-center justify-center text-center group ${isPlayed ? 'spent' : ''}`;
                
                btn.innerHTML = `
                    <div class="w-24 h-24 bg-white/10 rounded-3xl flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-purple-500/30 transition-all duration-300 shadow-inner">
                        <span class="text-5xl">${isPlayed ? '✔️' : '💼'}</span>
                    </div>
                    <div class="text-sm font-black text-purple-300 tracking-[0.2em] uppercase">Box ${item.id}</div>
                    `;

                btn.onclick = () => {
                    if (playedQuestions.includes(item.id)) {
                        if(!confirm("Open this box again?")) return;
                    }
                    openQuestion(item);
                };
                grid.appendChild(btn);
            });
        }

        function openQuestion(item) {
            activeQ = item;
            timeLeft = item.t;
            document.getElementById('m-timer').innerText = timeLeft + "s";
            document.getElementById('m-pts').innerText = item.p;
            document.getElementById('m-que').innerText = item.q;
            document.getElementById('m-ans').innerText = item.ans;
            document.getElementById('answer-box').classList.add('hidden');
            document.getElementById('revealBtn').classList.add('hidden');
            document.getElementById('pushBtn').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
            clearInterval(countdownInterval);
        }

        async function pushToLive() {
            const btn = document.getElementById('pushBtn');
            btn.innerHTML = "<span>⏳ SENDING...</span>"; btn.disabled = true;
            await fetch(SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ action: "pushQuestion", q: activeQ.q, p: activeQ.p, t: activeQ.t, ans: activeQ.ans, reveal: false })
            });
            if (!playedQuestions.includes(activeQ.id)) {
                playedQuestions.push(activeQ.id);
                localStorage.setItem('playedBibleQuiz', JSON.stringify(playedQuestions));
                renderGrid();
            }
            btn.innerHTML = "<span>✅ BROADCASTING</span>";
            btn.classList.replace('bg-purple-600', 'bg-blue-600');
            startTimer();
        }

        function startTimer() {
            clearInterval(countdownInterval);
            const timerEl = document.getElementById('m-timer');
            countdownInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    timerEl.innerText = timeLeft + "s";
                    if (timeLeft <= 5) timerEl.classList.add('text-red-500', 'animate-pulse');
                } else {
                    clearInterval(countdownInterval);
                    timerEl.innerText = "TIME'S UP";
                    document.getElementById('revealBtn').classList.remove('hidden');
                    document.getElementById('pushBtn').classList.add('hidden');
                }
            }, 1000);
        }

        async function revealAnswer() {
            document.getElementById('answer-box').classList.remove('hidden');
            document.getElementById('revealBtn').classList.add('hidden');
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "revealAnswer", reveal: true }) });
        }

        async function resetSystem() {
            if(!confirm("Clear live display?")) return;
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "reset" }) });
            closeModal();
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            clearInterval(countdownInterval);
            const btn = document.getElementById('pushBtn');
            btn.className = "w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center gap-2";
            btn.innerHTML = "🚀 PUSH TO MONITOR";
            btn.disabled = false;
        }

        function clearHistory() {
            if(confirm("Reset all boxes?")) {
                playedQuestions = [];
                localStorage.removeItem('playedBibleQuiz');
                renderGrid();
            }
        }

        renderGrid();
    </script>
</body>
</html>
